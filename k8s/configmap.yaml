apiVersion: v1
kind: ConfigMap
metadata:
  name: amazon-config
  namespace: amazon
  labels:
    app: amazon-app
data:
  APP_ENV:    "production"
  APP_PORT:   "8080"
  LOG_LEVEL:  "INFO"
  # FIXED: removed MANAGEMENT_PORT and ACTUATOR_PATH —
  # this is a plain JSP/Servlet app on Tomcat, no Spring Actuator.
  # All probes hit / on port 8080 (matches deployment.yaml probes).
  JAVA_OPTS:  "-Xms256m -Xmx512m -XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
